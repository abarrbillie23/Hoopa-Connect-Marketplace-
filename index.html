<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hoopa-Connect Marketplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-mark">HC</div>
    <span class="logo-text">Hoopa-Connect</span>
  </a>
  <a href="menu.html" class="menu-btn">☰</a>
</header>

<div class="container">

  <div class="hero-band" id="hero-band">
    <h2>Marketplace</h2>
    <p>Browse local items, cultural goods, vehicles &amp; more.</p>
  </div>

  <div class="cat-strip" id="cat-strip">
    <button class="cat-chip active" onclick="setFilter('All',this)">All</button>
    <button class="cat-chip" onclick="setFilter('Cultural / Handmade',this)">🪶 Cultural</button>
    <button class="cat-chip" onclick="setFilter('Electronics',this)">📱 Electronics</button>
    <button class="cat-chip" onclick="setFilter('Cars & Trucks',this)">🚘 Cars</button>
    <button class="cat-chip" onclick="setFilter('Home & Garden',this)">🏡 Home</button>
    <button class="cat-chip" onclick="setFilter('Clothing',this)">👕 Clothing</button>
    <button class="cat-chip" onclick="setFilter('Tools',this)">🛠 Tools</button>
    <button class="cat-chip" onclick="setFilter('Furniture',this)">🪑 Furniture</button>
    <button class="cat-chip" onclick="setFilter('Gaming',this)">🎮 Gaming</button>
    <button class="cat-chip" onclick="setFilter('Services',this)">🧰 Services</button>
    <button class="cat-chip" onclick="setFilter('Free Items',this)">🆓 Free</button>
  </div>

  <div class="grid" id="listings-grid">
    <div class="skeleton" style="height:220px;border-radius:14px;"></div>
    <div class="skeleton" style="height:220px;border-radius:14px;"></div>
    <div class="skeleton" style="height:220px;border-radius:14px;"></div>
    <div class="skeleton" style="height:220px;border-radius:14px;"></div>
  </div>

</div>

<nav class="bottom-nav">
  <a class="nav-item active" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="search.html">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </a>
  <a class="nav-item nav-sell" href="create-listing.html">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="nav-label">Sell</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="nav-label">Browse</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
let allListings = [];
let activeFilter = 'All';

async function loadListings() {
  const { data, error } = await supabaseClient
    .from('listings')
    .select('*')
    .order('id', { ascending: false });

  if (error) {
    document.getElementById('listings-grid').innerHTML =
      '<p class="grid-empty">Error loading listings.</p>';
    return;
  }
  allListings = data || [];

  // FIX: Read category from URL and apply filter on load
  const params = new URLSearchParams(location.search);
  const cat = params.get('category');
  if (cat) {
    activeFilter = cat;
    // Highlight the matching chip
    document.querySelectorAll('.cat-chip').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.trim() === cat || btn.textContent.includes(cat));
    });
    const hero = document.getElementById('hero-band');
    hero.querySelector('h2').textContent = cat;
    hero.querySelector('p').textContent = `Browsing ${cat} listings.`;
  }

  renderListings(allListings);
}

function setFilter(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.cat-chip').forEach(c => c.classList.remove('active'));
  btn.classList.add('active');
  renderListings(allListings);
  // Update URL without reload
  const url = cat === 'All' ? 'index.html' : `index.html?category=${encodeURIComponent(cat)}`;
  history.replaceState(null, '', url);
}

function renderListings(items) {
  const grid = document.getElementById('listings-grid');
  const filtered = activeFilter === 'All'
    ? items
    : items.filter(i => i.category === activeFilter);

  if (!filtered.length) {
    grid.innerHTML = '<p class="grid-empty">No listings found.</p>';
    return;
  }
  grid.innerHTML = '';
  filtered.forEach(item => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `listing.html?id=${item.id}`;
    a.innerHTML = `
      <img src="${esc(item.image_url) || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'}" loading="lazy" alt="${esc(item.title)}">
      <div class="card-body">
        <h3>${esc(item.title)}</h3>
        <span class="cat-tag">${esc(item.category)}</span>
        <div class="price">$${esc(item.price)}</div>
      </div>`;
    grid.appendChild(a);
  });
}

loadListings();
</script>
</body>
</html>
