<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Hoopa-Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="back-btn">←</a>
  <span class="topbar-title">Log In</span>
  <div></div>
</header>

<div class="container">

  <div class="form-card" style="margin-top:30px;">
    <div style="text-align:center;margin-bottom:20px;">
      <div class="logo-mark" style="margin:0 auto 12px;width:48px;height:48px;font-size:18px;border-radius:13px;">HC</div>
      <h2>Welcome back</h2>
      <p>Sign in to Hoopa-Connect Marketplace</p>
    </div>

    <label class="field-label">Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email">

    <label class="field-label">Password</label>
    <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">

    <button class="btn btn-primary mt-16" id="login-btn" onclick="loginUser()">Log In</button>

    <div style="margin-top:18px;display:flex;flex-direction:column;gap:10px;text-align:center;">
      <a href="signup.html" style="color:var(--text-muted);font-size:14px;text-decoration:none;">
        Don't have an account? <span style="color:var(--accent);">Create one →</span>
      </a>
      <a href="forgot-password.html" style="color:var(--text-dim);font-size:13px;text-decoration:none;">
        Forgot password?
      </a>
    </div>
  </div>

</div>

<script>
// If already logged in, redirect
supabaseClient.auth.getUser().then(({ data }) => {
  if (data?.user) location.href = 'profile.html';
});

async function loginUser() {
  const btn = document.getElementById('login-btn');
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;

  if (!email || !password) { showToast('Fill out all fields', 'error'); return; }

  btn.textContent = 'Logging in…';
  btn.disabled = true;

  const { error } = await supabaseClient.auth.signInWithPassword({ email, password });

  if (error) {
    showToast(error.message, 'error');
    btn.textContent = 'Log In';
    btn.disabled = false;
    return;
  }

  showToast('Welcome back! 👋', 'success');
  const redirect = new URLSearchParams(location.search).get('redirect') || 'index.html';
  setTimeout(() => location.href = redirect, 900);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter') loginUser();
});
</script>
</body>
</html>
