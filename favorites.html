<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Favorites — Hoopa-Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body>

<header class="topbar">
  <a href="profile.html" class="back-btn">←</a>
  <span class="topbar-title">Favorites</span>
  <div></div>
</header>

<div class="container">
  <div class="hero-band">
    <h2>Saved Listings</h2>
    <p>Items you've hearted while browsing.</p>
  </div>
  <div class="grid" id="fav-grid">
    <p class="grid-empty" style="grid-column:1/-1;">Loading…</p>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="search.html">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </a>
  <a class="nav-item nav-sell" href="create-listing.html">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="nav-label">Sell</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="nav-label">Browse</span>
  </a>
  <a class="nav-item active" href="profile.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
async function loadFavs() {
  const grid = document.getElementById('fav-grid');
  const favIds = JSON.parse(localStorage.getItem('hc_favs') || '[]');

  if (!favIds.length) {
    grid.innerHTML = '<p class="grid-empty" style="grid-column:1/-1;">No favorites yet. Tap ♡ on any listing to save it.</p>';
    return;
  }

  const { data, error } = await supabaseClient
    .from('listings')
    .select('*')
    .in('id', favIds);

  if (error || !data?.length) {
    grid.innerHTML = '<p class="grid-empty" style="grid-column:1/-1;">Could not load favorites.</p>';
    return;
  }

  grid.innerHTML = '';
  data.forEach(item => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `listing.html?id=${item.id}`;
    a.innerHTML = `
      <img src="${esc(item.image_url) || 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=400'}" loading="lazy" alt="${esc(item.title)}">
      <div class="card-body">
        <h3>${esc(item.title)}</h3>
        <span class="cat-tag">${esc(item.category)}</span>
        <div class="price">$${esc(item.price)}</div>
      </div>`;
    grid.appendChild(a);
  });
}

loadFavs();
</script>
</body>
</html>
