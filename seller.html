<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Seller Profile</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>

</head>

<body>

<header class="topbar">

  <a href="index.html" class="back-btn">
    ←
  </a>

  <div class="title">
    Seller Profile
  </div>

  <div></div>

</header>

<div class="container">

  <div class="profile-card">

    <img
      class="avatar"
      src="https://i.pravatar.cc/150"
    >

    <h2>
      RiverStoneCrafts
    </h2>

    <p>
      Local Hoopa seller sharing
      handmade cultural artwork,
      carvings and beadwork.
    </p>

  </div>

  <div class="form-card">

    <h2>
      Seller Listings
    </h2>

  </div>

  <div
    class="grid"
    id="seller-grid"
  >

    <p>Loading listings...</p>

  </div>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="search.html">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </a>
  <a class="nav-item nav-sell" href="create-listing.html">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="nav-label">Sell</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="nav-label">Browse</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg viewBox="0 0 24 24" stroke="currentColor" fill="none" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="22" height="22"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>

async function loadSellerListings(){

  const grid =
    document.getElementById(
      "seller-grid"
    );

  const { data, error } =
    await supabaseClient
      .from("listings")
      .select("*")
      .limit(12);

  if(error){

    console.log(error);

    grid.innerHTML = `
      <p>Error loading listings</p>
    `;

    return;
  }

  if(data.length === 0){

    grid.innerHTML = `
      <p>No listings yet</p>
    `;

    return;
  }

  grid.innerHTML = "";

  data.forEach(item => {

    grid.innerHTML += `

      <a
        href="listing.html?id=${item.id}"
        class="card"
      >

        <img
          src="${
            item.image_url ||
            'https://images.unsplash.com/photo-1511910849309-0dffb8785146'
          }"
        >

        <div class="card-body">

          <h3>
            ${item.title}
          </h3>

          <p>
            ${item.category}
          </p>

          <span>
            $${item.price}
          </span>

        </div>

      </a>

    `;

  });

}

loadSellerListings();

</script>

</body>
</html>
