<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Listings — Hoopa-Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body>

<header class="topbar">
  <a href="profile.html" class="back-btn">←</a>
  <span class="topbar-title">My Listings</span>
  <a href="create-listing.html" style="color:var(--accent);font-size:22px;text-decoration:none;line-height:1;">+</a>
</header>

<div class="container">
  <div id="my-list">
    <div class="skeleton" style="height:90px;border-radius:14px;margin-bottom:10px;"></div>
    <div class="skeleton" style="height:90px;border-radius:14px;margin-bottom:10px;"></div>
    <div class="skeleton" style="height:90px;border-radius:14px;"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="search.html">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </a>
  <a class="nav-item nav-sell" href="create-listing.html">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="nav-label">Sell</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="nav-label">Browse</span>
  </a>
  <a class="nav-item active" href="profile.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
async function loadMyListings() {
  const area = document.getElementById('my-list');

  // FIX: Check auth first, then filter by user_id
  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData?.user;

  if (!user) {
    area.innerHTML = `
      <p style="color:var(--text-muted);text-align:center;padding:40px 0;font-size:14px;">
        You must be <a href="login.html">logged in</a> to see your listings.
      </p>`;
    return;
  }

  const { data, error } = await supabaseClient
    .from('listings')
    .select('*')
    .eq('user_id', user.id)         // ← FIX: filter to current user only
    .order('id', { ascending: false });

  if (error) {
    area.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:40px 0;">Error loading listings.</p>';
    return;
  }

  if (!data || !data.length) {
    area.innerHTML = `
      <p style="color:var(--text-muted);text-align:center;padding:40px 0;font-size:14px;">
        You haven't posted anything yet.
      </p>
      <a href="create-listing.html" class="btn btn-primary">Post Your First Listing</a>`;
    return;
  }

  area.innerHTML = '';
  data.forEach(item => {
    const card = document.createElement('div');
    card.className = 'my-listing-card';
    card.innerHTML = `
      <img class="my-listing-img"
        src="${esc(item.image_url) || 'https://images.unsplash.com/photo-1511910849309-0dffb8785146?w=200'}"
        loading="lazy" alt="${esc(item.title)}">
      <div class="my-listing-body">
        <div>
          <h3>${esc(item.title)}</h3>
          <span class="cat-tag">${esc(item.category)}</span>
        </div>
        <div class="price">$${esc(item.price)}</div>
        <div class="my-listing-actions">
          <a href="edit-listing.html?id=${item.id}" class="btn btn-secondary btn-sm">Edit</a>
          <button class="btn btn-danger btn-sm" onclick="deleteListing(${item.id}, this)">Delete</button>
        </div>
      </div>`;
    area.appendChild(card);
  });
}

async function deleteListing(id, btn) {
  if (!confirm('Delete this listing? This cannot be undone.')) return;
  btn.textContent = '…';
  btn.disabled = true;

  const { error } = await supabaseClient
    .from('listings')
    .delete()
    .eq('id', id);

  if (error) {
    showToast('Error deleting listing', 'error');
    btn.textContent = 'Delete';
    btn.disabled = false;
    return;
  }

  showToast('Listing deleted');
  btn.closest('.my-listing-card').remove();
}

loadMyListings();
</script>
</body>
</html>
