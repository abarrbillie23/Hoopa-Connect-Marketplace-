<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Search — Hoopa-Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-mark">HC</div>
    <span class="logo-text">Hoopa-Connect</span>
  </a>
  <div></div>
</header>

<div class="container">

  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search-input" placeholder="Search listings…" oninput="searchListings()" autofocus>
  </div>

  <div id="state-msg" style="color:var(--text-muted);font-size:14px;text-align:center;padding:30px 0;">
    Loading listings…
  </div>

  <div class="grid" id="search-grid"></div>

</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item active" href="search.html">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </a>
  <a class="nav-item nav-sell" href="create-listing.html">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="nav-label">Sell</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="nav-label">Browse</span>
  </a>
  <a class="nav-item" href="profile.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
let allListings = [];

async function loadListings() {
  const msg = document.getElementById('state-msg');
  const { data, error } = await supabaseClient
    .from('listings')
    .select('*')
    .order('id', { ascending: false });

  if (error) { msg.textContent = 'Error loading listings.'; return; }
  allListings = data || [];
  msg.textContent = '';
  renderListings(allListings);

  // Pre-fill from URL ?q=
  const q = new URLSearchParams(location.search).get('q');
  if (q) {
    document.getElementById('search-input').value = q;
    searchListings();
  }
}

function renderListings(items) {
  const grid = document.getElementById('search-grid');
  const msg = document.getElementById('state-msg');
  if (!items.length) {
    grid.innerHTML = '';
    msg.textContent = 'No listings match your search.';
    return;
  }
  msg.textContent = '';
  grid.innerHTML = '';
  items.forEach(item => {
    const a = document.createElement('a');
    a.className = 'card';
    a.href = `listing.html?id=${item.id}`;
    a.innerHTML = `
      <img src="${esc(item.image_url) || 'https://images.unsplash.com/photo-1511910849309-0dffb8785146?w=400'}" loading="lazy" alt="${esc(item.title)}">
      <div class="card-body">
        <h3>${esc(item.title)}</h3>
        <span class="cat-tag">${esc(item.category)}</span>
        <div class="price">$${esc(item.price)}</div>
      </div>`;
    grid.appendChild(a);
  });
}

function searchListings() {
  const val = document.getElementById('search-input').value.toLowerCase().trim();
  if (!val) { renderListings(allListings); return; }
  const filtered = allListings.filter(i =>
    (i.title || '').toLowerCase().includes(val) ||
    (i.category || '').toLowerCase().includes(val) ||
    (i.description || '').toLowerCase().includes(val)
  );
  renderListings(filtered);
}

loadListings();
</script>
</body>
</html>
