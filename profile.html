<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Profile — Hoopa-Connect</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="js/supabase.js"></script>
</head>
<body>

<header class="topbar">
  <a href="index.html" class="logo">
    <div class="logo-mark">HC</div>
    <span class="logo-text">Hoopa-Connect</span>
  </a>
  <a href="menu.html" class="menu-btn">☰</a>
</header>

<div class="container">
  <div id="profile-area">
    <div class="skeleton" style="height:180px;border-radius:14px;margin-bottom:12px;"></div>
    <div class="skeleton" style="height:50px;border-radius:14px;"></div>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="index.html">
    <svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    <span class="nav-label">Home</span>
  </a>
  <a class="nav-item" href="search.html">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span class="nav-label">Search</span>
  </a>
  <a class="nav-item nav-sell" href="create-listing.html">
    <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    <span class="nav-label">Sell</span>
  </a>
  <a class="nav-item" href="categories.html">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span class="nav-label">Browse</span>
  </a>
  <a class="nav-item active" href="profile.html">
    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    <span class="nav-label">Profile</span>
  </a>
</nav>

<script>
async function checkProfile() {
  const area = document.getElementById('profile-area');

  const { data: userData } = await supabaseClient.auth.getUser();
  const user = userData?.user;

  if (!user) {
    // Not logged in — show login/signup prompt
    area.innerHTML = `
      <div class="hero-band">
        <h2>My Profile</h2>
        <p>Sign in to access your marketplace profile.</p>
      </div>
      <a href="login.html" class="btn btn-primary mt-16">Log In</a>
      <a href="signup.html" class="btn btn-secondary">Create Account</a>
    `;
    return;
  }

  // Logged in — try to load profile from Supabase
  const { data: profile } = await supabaseClient
    .from('profiles')
    .select('*')
    .eq('id', user.id)
    .single();

  const username = profile?.username || user.user_metadata?.username || 'User';
  const fullname = profile?.full_name || user.user_metadata?.full_name || '';
  const bio = profile?.bio || '';
  const avatarSrc = profile?.avatar_url || '';

  area.innerHTML = `
    <div class="profile-card">
      ${avatarSrc
        ? `<img class="avatar" src="${esc(avatarSrc)}" alt="avatar">`
        : `<div class="avatar" style="display:flex;align-items:center;justify-content:center;font-size:36px;background:var(--surface);">👤</div>`
      }
      <h2>${esc(username)}</h2>
      <p class="handle">${esc(fullname)}</p>
      <p class="bio">${esc(bio) || 'No bio yet.'}</p>
    </div>

    <a href="inbox.html" class="menu-item mt-16">
      <div class="menu-icon">💬</div>
      <div class="menu-item-text">
        <h3>Messages</h3>
        <p>Your conversations</p>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <a href="my-listings.html" class="menu-item">
      <div class="menu-icon">🛍️</div>
      <div class="menu-item-text">
        <h3>My Listings</h3>
        <p>View and manage your posts</p>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <a href="favorites.html" class="menu-item">
      <div class="menu-icon">♥</div>
      <div class="menu-item-text">
        <h3>Favorites</h3>
        <p>Items you've saved</p>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <a href="edit-profile.html" class="menu-item">
      <div class="menu-icon">✏️</div>
      <div class="menu-item-text">
        <h3>Edit Profile</h3>
        <p>Update your info</p>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <a href="settings.html" class="menu-item">
      <div class="menu-icon">⚙️</div>
      <div class="menu-item-text">
        <h3>Settings</h3>
        <p>Notifications, privacy &amp; more</p>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <a href="admin.html" class="menu-item">
      <div class="menu-icon">🛠️</div>
      <div class="menu-item-text">
        <h3>Admin Tools</h3>
        <p>Manage listings &amp; data</p>
      </div>
      <span class="menu-arrow">›</span>
    </a>

    <div class="divider" style="margin-top:20px;"></div>
    <button class="btn btn-secondary" onclick="logout()" style="margin-top:8px;">Sign Out</button>
  `;
}

async function logout() {
  await supabaseClient.auth.signOut();
  showToast('Signed out');
  setTimeout(() => location.reload(), 900);
}

checkProfile();
</script>
</body>
</html>
